<article class="survey-card" (click)="onCardClick()">

  <div class="survey-card__top">
    <span class="survey-card__category">{{ survey().category }}</span>
  </div>

  <div class="survey-card__body">
    <h3 class="survey-card__title">{{ survey().title }}</h3>
  </div>

  <footer class="survey-card__footer">
    @if (daysLeft > 0) {
      <span class="survey-card__deadline">
        Ends in {{ daysLeft }} {{ daysLeft === 1 ? 'Day' : 'Days' }}
      </span>
    }
  </footer>

</article>
