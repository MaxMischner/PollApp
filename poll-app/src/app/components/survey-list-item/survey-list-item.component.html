<article
  class="survey-item"
  [class.survey-item--closed]="survey().status === 'closed'"
  (click)="onItemClick()"
>
  <div class="survey-item__content">
    <span class="survey-item__category">{{ survey().category }}</span>
    <h3 class="survey-item__title">{{ survey().title }}</h3>
  </div>

  <footer class="survey-item__footer">
    <span class="survey-item__deadline">
      @if (survey().status === 'closed') {
        Ended: {{ formattedDeadline }}
      } @else {
        Ends in {{ daysLeft }} {{ daysLeft === 1 ? 'Day' : 'Days' }}
      }
    </span>
  </footer>
</article>
